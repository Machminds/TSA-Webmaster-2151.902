<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donate | Philly's Connect</title>

    <link rel="stylesheet" href="../../src/css/main.css" />
    <link rel="stylesheet" href="../../src/css/about.css" />

    <script src="../../src/js/main.js" defer></script>
    <script src="../../src/js/resources.js" defer></script>
  </head>

  <body class="enter" onload="initPage('donate', 'resource-list')">
    <div id="transition">
      <div class="panel top"></div>
      <div class="panel bottom"></div>
    </div>

    <div class="dropdown">
      <nav>
        <div class="wrapper">
          <div class="logo"><a href="../../index.html">Philly's Connect</a></div>

          <input type="radio" name="slider" id="menu-btn" />
          <input type="radio" name="slider" id="close-btn" />

          <ul class="nav-links">
            <label for="close-btn" class="btn close-btn">
              <i class="fas fa-times"></i>
            </label>

            <li><a href="../../index.html">Home</a></li>
            <li><a href="../about/index.html">About</a></li>

            <li>
              <a href="#" class="desktop-item">Help Out!</a>
              <input type="checkbox" id="showDrop" />
              <label for="showDrop" class="mobile-item">Help Out!</label>
              <ul class="drop-menu">
                <li><a href="add-resources.html">Add Resources</a></li>
                <li><a href="volunteer.html">Volunteer</a></li>
                <li><a href="donate.html">Donate</a></li>
              </ul>
            </li>

            <li><a href="../stories/index.html">Stories</a></li>
            <li>
              <a href="../../assets/references/Phillys-Connect-References.pdf" target="_blank">
                References
              </a>
            </li>
          </ul>

          <label for="menu-btn" class="btn menu-btn">
            <i class="fas fa-bars"></i>
          </label>
        </div>
      </nav>
    </div>

    <div class="container">
      <div class="parallax about-parallax">
        <div class="about-box">
          <h1 class="title">
            Donate
            <span
              class="type-cycle"
              id="typeCycle"
              data-words='["Today","Directly","Locally","Meaningfully","Here"]'
              data-speed="3000"
            ></span>
          </h1>

          <p>
            Support organizations that strengthen neighborhoods, education,
            food access, and community life across Philadelphia.
          </p>

          <div class="filters">
            <select id="categoryFilter">
              <option value="all">All Categories</option>
              <option value="Animal Welfare">Animal Welfare</option>
              <option value="Arts and Community">Arts and Community</option>
              <option value="Children and Families">Children and Families</option>
              <option value="Community Service">Community Service</option>
              <option value="Crisis Support">Crisis Support</option>
              <option value="Education">Education</option>
              <option value="Environment">Environment</option>
              <option value="Food Support">Food Support</option>
              <option value="Health Support">Health Support</option>
              <option value="Homeless Support">Homeless Support</option>
              <option value="Housing Support">Housing Support</option>
              <option value="Immigrant Support">Immigrant Support</option>
              <option value="Workforce">Workforce</option>
              <option value="Youth Development">Youth Development</option>
            </select>

            <input
              id="searchFilter"
              type="text"
              placeholder="Search organizations..."
            />
          </div>

          <div id="resource-list" class="resource-list"></div>
        </div>
      </div>
    </div>
  </body>
</html>
